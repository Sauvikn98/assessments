version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cert_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: certsdb
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d certsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cert_rust_backend
    ports:
      - "8445:8443"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/certsdb
      - RUST_LOG=info
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Optional: Persist certificates generated by the service
      - certs_data:/app/certs

volumes:
  postgres_data:
  certs_data:
